# Option A: Export to .env File Approach
# =========================================
# This pipeline demonstrates using Configu to export configuration
# to a .env file, then sourcing it in shell scripts.
#
# Benefits:
# - Simple, familiar .env workflow
# - Easy debugging (can inspect .env file)
# - Works with Docker --env-file
# - Shell scripts can use $VAR_NAME directly

stages:
  - setup
  - build
  - test
  - deploy

variables:
  # Local Configu store setup
  CONFIGU_STORE: "configu-json"
  CONFIGU_CONFIG: "path=config.store.json"

# Install Configu CLI once
.install_configu: &install_configu
  - echo "📦 Installing Configu CLI..."
  - npm install -g @configu/cli
  - configu --version

# Common setup for all jobs
before_script:
  - *install_configu

# ========================================
# Development Environment
# ========================================
deploy:development:
  stage: deploy
  environment:
    name: development
    url: https://dev.example.com
  only:
    - develop
  script:
    - echo "🔧 Deploying to DEVELOPMENT..."
    
    # Step 1: Export Configu values to .env file
    - echo "📝 Exporting configuration from local Configu store..."
    - configu export --store "$CONFIGU_STORE" --config "$CONFIGU_CONFIG" --set "development" --schema "./config.cfgu.json" > .env
    
    # Step 2: Verify .env file was created
    - echo "✅ .env file created:"
    - cat .env
    
    # Step 3: Source the .env file (makes variables available)
    - source .env
    
    # Step 4: Verify variables are accessible
    - echo "🔍 Verifying configuration variables..."
    - echo "API_URL = $API_URL"
    - echo "DB_HOST = $DB_HOST"
    - echo "DB_PORT = $DB_PORT"
    - echo "REDIS_URL = $REDIS_URL"
    - echo "LOG_LEVEL = $LOG_LEVEL"
    
    # Step 5: Run deployment script (has access to all variables)
    - echo "🚀 Running deployment..."
    - chmod +x ./deploy.sh
    - ./deploy.sh
    
    # Step 6: Optional - Docker example using .env
    # - docker build --env-file .env -t myapp:dev .
    # - docker-compose --env-file .env up -d
    
  artifacts:
    paths:
      - .env
    expire_in: 1 hour
    when: on_failure  # Keep .env for debugging if deployment fails

# ========================================
# Staging Environment
# ========================================
deploy:staging:
  stage: deploy
  environment:
    name: staging
    url: https://staging.example.com
  only:
    - main
  when: manual  # Require manual approval
  script:
    - echo "🔧 Deploying to STAGING..."
    
    # Export staging configuration
    - configu export --store "$CONFIGU_STORE" --config "$CONFIGU_CONFIG" --set "staging" --schema "./config.cfgu.json" > .env
    - source .env
    
    # Show what's being deployed
    - echo "📊 Staging Configuration:"
    - cat .env | grep -v "PASSWORD\|SECRET\|TOKEN"  # Hide sensitive values
    
    # Deploy
    - chmod +x ./deploy.sh
    - ./deploy.sh
    
    # Run smoke tests
    - echo "🧪 Running smoke tests..."
    - curl -f $API_URL/health || exit 1

# ========================================
# Production Environment
# ========================================
deploy:production:
  stage: deploy
  environment:
    name: production
    url: https://api.example.com
  only:
    - tags  # Only deploy tagged releases
  when: manual  # Always require manual approval for production
  script:
    - echo "🚀 Deploying to PRODUCTION..."
    - echo "⚠️  WARNING: This is a PRODUCTION deployment!"
    
    # Export production configuration
    - configu export --store "$CONFIGU_STORE" --config "$CONFIGU_CONFIG" --set "production" --schema "./config.cfgu.json" > .env
    - source .env
    
    # Validate critical variables before deploying
    - |
      echo "✅ Validating production configuration..."
      if [ -z "$API_URL" ]; then
        echo "❌ ERROR: API_URL is not set!"
        exit 1
      fi
      if [ -z "$DB_HOST" ]; then
        echo "❌ ERROR: DB_HOST is not set!"
        exit 1
      fi
      echo "✅ All critical variables present"
    
    # Create backup before deployment
    - echo "💾 Creating pre-deployment backup..."
    - ./backup.sh || echo "⚠️  Backup script not found, continuing..."
    
    # Deploy
    - chmod +x ./deploy.sh
    - ./deploy.sh
    
    # Post-deployment verification
    - echo "🔍 Verifying deployment..."
    - curl -f $API_URL/health || exit 1
    - curl -f $API_URL/version || exit 1
    
  artifacts:
    paths:
      - .env
    expire_in: 1 week
    when: on_failure  # Keep config for post-mortem if deployment fails

# ========================================
# Build Job (with .env example)
# ========================================
build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    - echo "🐳 Building Docker image..."
    
    # Export build-time configuration
    - configu export --store "$CONFIGU_STORE" --config "$CONFIGU_CONFIG" --set "production" --schema "./config.cfgu.json" > .env
    
    # Build with .env file (Docker 20.10+)
    - docker build --env-file .env -t myapp:$CI_COMMIT_TAG .
    
    # Or pass specific variables as build args
    - source .env
    - |
      docker build \
        --build-arg API_URL=$API_URL \
        --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
        --build-arg VCS_REF=$CI_COMMIT_SHA \
        -t myapp:$CI_COMMIT_TAG .

# ========================================
# Test Job (feature flags example)
# ========================================
test:integration:
  stage: test
  script:
    - echo "🧪 Running integration tests..."
    
    # Export test environment config
    - configu export --store "$CONFIGU_STORE" --config "$CONFIGU_CONFIG" --set "test" --schema "./config.cfgu.json" > .env
    - source .env
    
    # Check feature flags
    - |
      if [ "$FEATURE_NEW_UI" = "true" ]; then
        echo "✅ Testing NEW UI features..."
        npm run test:new-ui
      else
        echo "⏭️  Skipping NEW UI tests (feature disabled)"
      fi
    
    - |
      if [ "$FEATURE_ANALYTICS" = "true" ]; then
        echo "✅ Testing ANALYTICS features..."
        npm run test:analytics
      fi
    
    # Run standard tests
    - npm run test:integration

# ========================================
# Cleanup Job
# ========================================
cleanup:
  stage: .post
  when: always
  script:
    - echo "🧹 Cleaning up..."
    - rm -f .env  # Remove .env file for security
    - echo "✅ Cleanup complete"
